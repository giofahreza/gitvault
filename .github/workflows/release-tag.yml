name: Release Tag Pipeline

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Build Android APKs + Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.1"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate model code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Derive release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must look like v1.2.3 or 1.2.3"
            exit 1
          fi
          BUILD_NUMBER="$(echo "$VERSION" | awk -F. '{ print ($1 * 1000000) + ($2 * 1000) + $3 }')"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Configure Android signing (if secrets exist)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      - name: Android signing mode
        run: |
          if [ -f android/key.properties ]; then
            echo "Release signing configured from repository secrets."
          else
            echo "::warning::Android signing secrets are not configured. Falling back to debug signing (as defined in android/app/build.gradle.kts)."
          fi

      - name: Build universal APK
        run: |
          flutter build apk --release --no-shrink \
            --build-name "$RELEASE_VERSION" \
            --build-number "$RELEASE_BUILD_NUMBER" \
            --dart-define "GITVAULT_VERSION=$RELEASE_VERSION" \
            --dart-define "GITVAULT_BUILD_NUMBER=$RELEASE_BUILD_NUMBER"

      - name: Prepare universal artifact
        run: |
          mkdir -p release-artifacts
          TAG="${GITHUB_REF_NAME}"
          cp build/app/outputs/flutter-apk/app-release.apk "release-artifacts/gitvault-${TAG}-universal.apk"

      - name: Build ABI-specific APKs
        run: |
          flutter build apk --release --split-per-abi --no-shrink \
            --build-name "$RELEASE_VERSION" \
            --build-number "$RELEASE_BUILD_NUMBER" \
            --dart-define "GITVAULT_VERSION=$RELEASE_VERSION" \
            --dart-define "GITVAULT_BUILD_NUMBER=$RELEASE_BUILD_NUMBER"

      - name: Prepare ABI artifacts + checksums
        run: |
          TAG="${GITHUB_REF_NAME}"
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi="$(basename "$apk" | sed -E 's/app-(.*)-release.apk/\1/')"
            cp "$apk" "release-artifacts/gitvault-${TAG}-${abi}.apk"
          done
          (cd release-artifacts && sha256sum -- *.apk > SHA256SUMS.txt)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.ref_name }}
          path: release-artifacts/*

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-artifacts/*.apk
            release-artifacts/SHA256SUMS.txt

  deploy-web:
    name: Build + Deploy Web to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.1"
          cache: true

      - name: Enable web support
        run: flutter config --enable-web

      - name: Ensure web platform exists
        run: |
          if [ ! -d web ]; then
            flutter create --platforms=web .
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate model code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Derive release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must look like v1.2.3 or 1.2.3"
            exit 1
          fi
          BUILD_NUMBER="$(echo "$VERSION" | awk -F. '{ print ($1 * 1000000) + ($2 * 1000) + $3 }')"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Build Flutter web
        run: |
          flutter build web --release --base-href "/gitvault/" \
            --dart-define "GITVAULT_VERSION=$RELEASE_VERSION" \
            --dart-define "GITVAULT_BUILD_NUMBER=$RELEASE_BUILD_NUMBER"

      - name: Prepare GitHub Pages SPA fallback
        run: |
          cp build/web/index.html build/web/404.html
          touch build/web/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
